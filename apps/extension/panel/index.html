<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>API Debugger</title>
    <style>
      body { font-family: sans-serif; margin: 0; padding: 12px; }
      h1 { font-size: 16px; margin: 0 0 8px; }
      p { font-size: 12px; color: #555; }

      /* Detail view styles */
      #detail h2 { margin: 8px 0 4px; font-size: 13px; }
      #detail table { width:100%; border-collapse: collapse; margin-bottom:8px; }
      #detail th, #detail td { text-align:left; padding:4px; border-bottom:1px solid #eee; font-size:11px; }
      #detail pre { background:#fafafa; padding:6px; max-height:200px; overflow:auto; font-size:11px; }
    </style>
  </head>
  <body>
    <h1>API Debugger</h1>
    <div>
      <button id="refresh">Refresh</button>
      <button id="clear">Clear</button>
    </div>
    <div id="detail" style="margin-bottom:12px;padding:6px;border:1px solid #ddd;display:none;"></div>
    <div id="list"></div>

  <script src="../utils/diff.js"></script>
  <script src="../utils/diagnostics.js"></script>
  <script src="../utils/export.js"></script>
  <script src="panel.js"></script>
  </body>
</html>
